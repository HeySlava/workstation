---
- name: Install apt apps
  ansible.builtin.apt:
    name:
      - curl
      - fd-find
      - ffmpeg
      - flameshot
      - fzf
      - gcc
      - htop
      - i3blocks
      - inotify-tools
      - kitty
      - libpq-dev
      - maim
      - make
      - npm
      - perl
      - python3-pip
      - ripgrep
      - rofi
      - sqlite3
      - stow
      - tmux
      - tree
      - unrar
      - xclip
      - zathura
      - zeal
    update_cache: true
    cache_valid_time: 6400
  become: true
